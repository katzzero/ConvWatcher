version: "3.8"

services:
  convwatcher:
    image: ghcr.io/katzzero/convwatcher:latest
    container_name: convwatcher
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ./config:/app/config
      - ./inputs:/app/inputs
      - ./outputs:/app/outputs
      - ./logs:/app/logs
    devices:
      - /dev/dri:/dev/dri
    environment:
      - RUST_LOG=info
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          memory: 2G
