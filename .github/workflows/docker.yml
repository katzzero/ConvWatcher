name: Build and Push Docker Images

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: env.DOCKER_USERNAME != ''
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set Docker tags
        id: tags
        env:
          DH_USER: ${{ secrets.DOCKER_USERNAME }}
        run: |
          TAGS="ghcr.io/katzzero/convwatcher:latest"
          TAGS="${TAGS},ghcr.io/katzzero/convwatcher:${{ steps.version.outputs.VERSION }}"
          if [ -n "${DH_USER}" ]; then
            TAGS="${TAGS},katzzero/convwatcher:latest"
            TAGS="${TAGS},katzzero/convwatcher:${{ steps.version.outputs.VERSION }}"
          fi
          echo "value=${TAGS}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.value }}
