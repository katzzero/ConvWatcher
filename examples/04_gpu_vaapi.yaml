# ─────────────────────────────────────────────────────────────
# ConvWatcher — Intel QuickSync (VAAPI)
# Uses Intel integrated GPU for hardware-accelerated encoding.
# Ideal for headless servers, NAS devices, and low-power setups.
# ─────────────────────────────────────────────────────────────

global:
  file_check_interval: 2s
  stable_time: 5s
  ffmpeg_path: /usr/bin/ffmpeg
  max_concurrent: 4
  refresh_interval: 5m

  codec_presets:
    video: video_codecs.yaml

  log:
    errors_file: /app/logs/errors.log
    max_log_files: 30
    max_log_size_mb: 100
    max_error_log_size_mb: 50

  healthcheck:
    http_port: 8080
    bind_address: 0.0.0.0

  disk_space:
    check_interval: 60s
    threshold: 500
    check_output: false
    check_watch: false

  history:
    persistent: false
    file: /app/logs/history.json
    max_records: 500

# Docker compose.yml must include:
#   devices:
#     - /dev/dri:/dev/dri

watchers:
  - name: vaapi-h264
    watch_folder: /app/inputs/vaapi/
    output_folder: /app/outputs/vaapi-output/
    type: video
    rules:
      # H.264 via VAAPI — Intel/AMD GPU
      - input_extensions: [.mp4, .avi, .mkv, .mov, .mxf, .mts]
        preset: h264_vaapi
        output_name: "{base}_{codec}_{num}.{ext}"
        check_duration: true
        min_duration_ratio: 0.9

  - name: vaapi-h265
    watch_folder: /app/inputs/vaapi-hevc/
    output_folder: /app/outputs/vaapi-hevc-output/
    type: video
    rules:
      # H.265/HEVC via VAAPI — smaller files
      - input_extensions: [.mp4, .mkv, .mov, .mxf]
        preset: h265_vaapi
        output_name: "{base}_{codec}_{num}.{ext}"
        check_duration: true
        min_duration_ratio: 0.9

  - name: vaapi-av1
    watch_folder: /app/inputs/vaapi-av1/
    output_folder: /app/outputs/vaapi-av1-output/
    type: video
    rules:
      # AV1 via VAAPI — best compression (Intel Arc / newer)
      - input_extensions: [.mp4, .mkv, .mov, .mxf]
        preset: av1_vaapi
        output_name: "{base}_{codec}_{num}.{ext}"
        check_duration: true
        min_duration_ratio: 0.9
