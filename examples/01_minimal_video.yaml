# ─────────────────────────────────────────────────────────────
# ConvWatcher — Minimal Example
# Single video watcher with CPU encoding.
# The simplest possible configuration.
# ─────────────────────────────────────────────────────────────

global:
  file_check_interval: 2s
  stable_time: 5s
  ffmpeg_path: /usr/bin/ffmpeg
  max_concurrent: 4
  refresh_interval: 5m

  codec_presets:
    video: video_codecs.yaml

  log:
    errors_file: /app/logs/errors.log
    max_log_files: 30
    max_log_size_mb: 100
    max_error_log_size_mb: 50

  healthcheck:
    http_port: 8080
    bind_address: 0.0.0.0

  disk_space:
    check_interval: 60s
    threshold: 500
    check_output: false
    check_watch: false

  history:
    persistent: false
    file: /app/logs/history.json
    max_records: 500

watchers:
  - name: videos
    watch_folder: /app/inputs/videos/
    output_folder: /app/outputs/videos-output/
    type: video
    rules:
      - input_extensions: [.mp4, .avi, .mkv, .mov, .mxf, .mts]
        preset: h264_cpu
        output_name: "{base}_{codec}_{num}.{ext}"
        check_duration: true
        min_duration_ratio: 0.9
